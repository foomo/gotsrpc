module:
  name: github.com/foomo/gotsrpc/v2
  path: ../../

targets:
  generics:
    services:
      /service: Service
    package: github.com/foomo/gotsrpc/v2/tests/generics/server
    out: ./client/client.ts
    gorpc: [ Service ]
    tsrpc: [ Service ]

mappings:
  github.com/foomo/gotsrpc/v2/tests/generics/server:
    out: ./client/vo.ts
  github.com/foomo/gotsrpc/v2/tests/common:
    out: ./client/vo-common.ts
